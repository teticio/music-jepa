seed: 42

encoder:
  ckpt: checkpoints-sample/last.ckpt
  config: configs/encoder_sample.yaml

data:
  spectrograms_dir: data/spectrograms
  playlists_file: data/playlists_sample.csv
  task: infill
  max_history: 3
  max_span: 32
  min_playlist_len: 10
  max_playlist_len: 30
  val_fraction: 0.05
  batch_size: 96
  num_workers: 4

model:
  hidden_dim: 1024
  dropout: 0.1
  pool_num_heads: 4
  pool_dropout: 0.0
  residual_source: third

training:
  epochs: 100
  lr: 0.0003
  weight_decay: 0.01
  temperature: 0.07
  grad_clip: 1.0
  early_stopping_patience: 8
  early_stopping_min_delta: 0.001
  out: checkpoints-sample/infill_head_patch.pt
