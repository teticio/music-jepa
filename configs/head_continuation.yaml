seed: 42

data:
  embeddings_file: embeddings.npy
  playlists_file: data/playlists_dedup.csv
  # continuation: seed playlist -> next track
  # infill: left/right playlist anchors -> missing middle track
  task: continuation
  max_history: 3
  max_span: 32
  min_playlist_len: 10
  max_playlist_len: 30
  val_fraction: 0.05
  batch_size: 512
  num_workers: 4

model:
  hidden_dim: 1024
  dropout: 0.1
  # Continuation predicts a residual around the most recent track embedding.
  residual_source: first

training:
  epochs: 100
  lr: 0.0003
  weight_decay: 0.01
  temperature: 0.07
  grad_clip: 1.0
  early_stopping_patience: 8
  early_stopping_min_delta: 0.001
  out: checkpoints/continuation_head.pt
