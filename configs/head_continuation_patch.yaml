seed: 42

encoder:
  ckpt: checkpoints/last.ckpt
  config: configs/encoder.yaml

data:
  spectrograms_dir: data/spectrograms
  playlists_file: data/playlists_dedup.csv
  task: continuation
  max_history: 3
  max_span: 32
  min_playlist_len: 10
  max_playlist_len: 30
  val_fraction: 0.05
  # Each batch runs the encoder on (batch_size * (max_history + 1)) spectrograms,
  # so this is much smaller than the track-head config (which only does lookups).
  batch_size: 64
  num_workers: 4

model:
  hidden_dim: 1024
  dropout: 0.1
  pool_num_heads: 4
  pool_dropout: 0.0
  residual_source: first

training:
  epochs: 100
  lr: 0.0003
  weight_decay: 0.01
  temperature: 0.07
  grad_clip: 1.0
  early_stopping_patience: 8
  early_stopping_min_delta: 0.001
  out: checkpoints/continuation_head_patch.pt
